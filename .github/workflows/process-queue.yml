name: Process Message Queue

on:
  schedule:
    # Ejecuta cada minuto (puede tener delays en repos gratuitos)
    - cron: '* * * * *'
  
  # Trigger automático en cualquier push a main
  push:
    branches:
      - main
  
  # Permite ejecución manual para testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Capture trigger information
        run: |
          mkdir -p /tmp/trigger_info
          echo "=== Workflow Trigger Information ===" > /tmp/trigger_info/trigger.txt
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> /tmp/trigger_info/trigger.txt
          echo "Event Name: ${{ github.event_name }}" >> /tmp/trigger_info/trigger.txt
          echo "Triggered by: ${{ github.actor }}" >> /tmp/trigger_info/trigger.txt
          echo "Repository: ${{ github.repository }}" >> /tmp/trigger_info/trigger.txt
          echo "Ref: ${{ github.ref }}" >> /tmp/trigger_info/trigger.txt
          echo "SHA: ${{ github.sha }}" >> /tmp/trigger_info/trigger.txt
          echo "Workflow: ${{ github.workflow }}" >> /tmp/trigger_info/trigger.txt
          echo "Run ID: ${{ github.run_id }}" >> /tmp/trigger_info/trigger.txt
          echo "Run Number: ${{ github.run_number }}" >> /tmp/trigger_info/trigger.txt
          echo "" >> /tmp/trigger_info/trigger.txt
          echo "--- Commit Info ---" >> /tmp/trigger_info/trigger.txt
          echo "Commit Message: ${{ github.event.head_commit.message }}" >> /tmp/trigger_info/trigger.txt
          echo "Committer: ${{ github.event.head_commit.committer.name }}" >> /tmp/trigger_info/trigger.txt
          echo "Committer Email: ${{ github.event.head_commit.committer.email }}" >> /tmp/trigger_info/trigger.txt
          echo "Author: ${{ github.event.head_commit.author.name }}" >> /tmp/trigger_info/trigger.txt
          echo "Author Email: ${{ github.event.head_commit.author.email }}" >> /tmp/trigger_info/trigger.txt
          cat /tmp/trigger_info/trigger.txt
      
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check if queue has messages
        id: check_queue
        run: |
          if [ -f queue/pending.jsonl ] && [ -s queue/pending.jsonl ]; then
            echo "has_messages=true" >> $GITHUB_OUTPUT
            echo "✅ Cola tiene mensajes pendientes"
          else
            echo "has_messages=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Cola vacía"
          fi
      
      - name: Process messages
        if: steps.check_queue.outputs.has_messages == 'true'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          echo "📤 Procesando mensajes..."
          
          # Contador de mensajes procesados
          count=0
          
          # Leer cada línea del archivo JSONL
          while IFS= read -r message; do
            # Saltar líneas vacías
            if [ -z "$message" ]; then
              continue
            fi
            
            # Añadir timestamp si no existe
            timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            
            # Construir payload completo
            payload=$(echo "$message" | jq --arg ts "$timestamp" --arg repo "${{ github.repository }}" '
              .timestamp = $ts |
              .repository = $repo |
              if .source == null then .source = "GitHub Queue" else . end |
              if .title == null then .title = "Message from Queue" else . end
            ')
            
            echo "Enviando: $payload"
            
            # Enviar a Teams
            curl -X POST "$TEAMS_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$payload" \
              -w "\nHTTP Status: %{http_code}\n"
            
            count=$((count + 1))
            
            # Pequeña pausa entre mensajes para no saturar
            sleep 1
          done < queue/pending.jsonl
          
          echo "✅ $count mensajes procesados"
      
      - name: Clear queue
        if: steps.check_queue.outputs.has_messages == 'true'
        run: |
          # Vaciar el archivo (mantenerlo para futuros mensajes)
          > queue/pending.jsonl
          
          echo "🧹 Cola limpiada"
      
      - name: Save trigger information
        if: steps.check_queue.outputs.has_messages == 'true'
        run: |
          mkdir -p logs
          cp /tmp/trigger_info/trigger.txt logs/last_trigger.txt
          
          # Mantener histórico (últimas 10 ejecuciones)
          timestamp=$(date -u +%Y%m%d_%H%M%S)
          cp /tmp/trigger_info/trigger.txt logs/trigger_${timestamp}.txt
          
          # Limpiar logs antiguos (mantener solo últimos 10)
          cd logs
          ls -t trigger_*.txt | tail -n +11 | xargs -r rm
          cd ..
      
      - name: Commit cleared queue
        if: steps.check_queue.outputs.has_messages == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add queue/pending.jsonl logs/
          
          # Solo hacer commit si hay cambios
          if git diff --staged --quiet; then
            echo "No hay cambios que commitear"
          else
            git commit -m "🤖 Processed message queue [skip ci]"
            git push
            echo "✅ Cola actualizada en el repositorio"
          fi
